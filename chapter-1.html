<title>Chapitre 1 — Un nouveau départ | 60 jours de français</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<body>
<div class="sjf-root" id="sjf-root"></div>
<script src="engine.js"></script>
<script>
SJF.render(document.getElementById('sjf-root'), {
  number: 1,
  title: "Un nouveau départ",
  subtitle: "Élise arrive en France, valise à la main et cœur un peu inquiet.",
  nextChapterLabel: "Chapitre 2 — Dans la cuisine de Marie — arrive bientôt.",
  story: [
    {t:'p', fr:"Élise arrive à la gare de Beaune, une petite ville en France. Elle a une grande valise et un peu peur. Elle ne parle pas encore très bien français, mais elle veut essayer. Aujourd'hui, sa vie change.",
     en:"Élise arrives at the train station in Beaune, a small town in France. She has a big suitcase and a little fear. She doesn't speak French very well yet, but she wants to try. Today, her life changes."},
    {t:'p', fr:"Sur le quai, Lucas attend. Il est grand, il a les cheveux bruns, et il sourit tout de suite quand il voit Élise. Il court vers elle.",
     en:"On the platform, Lucas is waiting. He's tall, he has brown hair, and he smiles right away when he sees Élise. He runs toward her."},
    {t:'d', s:'Lucas', fr:"Tu es enfin là ! J'ai hâte de te voir depuis ce matin.", en:"You're finally here! I've been looking forward to seeing you since this morning."},
    {t:'d', s:'Élise', fr:"Moi aussi ! Le train était long, mais maintenant je suis contente.", en:"Me too! The train was long, but now I'm happy."},
    {t:'d', s:'Lucas', fr:"Tu es fatiguée ?", en:"Are you tired?"},
    {t:'d', s:'Élise', fr:"Un peu, mais ça va. Je suis surtout heureuse d'être ici, avec toi.", en:"A little, but it's okay. I'm mostly happy to be here, with you."},
    {t:'p', fr:"Ils s'embrassent, puis Lucas prend la valise d'Élise. Ils marchent ensemble vers la voiture. Il fait beau aujourd'hui, et le ciel est bleu.",
     en:"They hug, then Lucas takes Élise's suitcase. They walk together toward the car. The weather is nice today, and the sky is blue."},
    {t:'d', s:'Lucas', fr:"Alors, tu es prête pour rencontrer ma famille ce soir ?", en:"So, are you ready to meet my family tonight?"},
    {t:'d', s:'Élise', fr:"Je crois que oui... mais j'ai un peu peur. Je ne comprends pas toujours vite le français, et j'ai peur de faire des erreurs.", en:"I think so... but I'm a little scared. I don't always understand French quickly, and I'm afraid of making mistakes."},
    {t:'d', s:'Lucas', fr:"Ne t'inquiète pas. Ma famille est très gentille. Et moi, je suis là : je peux traduire si tu ne comprends pas.", en:"Don't worry. My family is very kind. And I'm here — I can translate if you don't understand."},
    {t:'d', s:'Élise', fr:"D'accord. Merci, tu es vraiment patient avec moi.", en:"Okay. Thank you, you're really patient with me."},
    {t:'p', fr:"Après vingt minutes de voiture, ils arrivent devant une petite maison avec un grand jardin. C'est la maison des parents de Lucas.",
     en:"After twenty minutes in the car, they arrive in front of a small house with a big garden. It's Lucas's parents' house."},
    {t:'d', s:'Marie', fr:"Ah, te voilà enfin ! Et voici Élise ! Bienvenue, ma chérie !", en:"Ah, there you are at last! And here's Élise! Welcome, dear!"},
    {t:'d', s:'Élise', fr:"Bonjour Madame... euh... merci beaucoup de m'inviter.", en:"Hello Madam... um... thank you so much for inviting me."},
    {t:'d', s:'Marie', fr:"Appelle-moi Marie, s'il te plaît ! Entre, entre, il fait froid dehors.", en:"Call me Marie, please! Come in, come in, it's cold outside."},
    {t:'p', fr:"Dans la maison, ça sent bon la cuisine. Marie a préparé un grand repas : du poulet, des légumes, et un gâteau au chocolat pour le dessert. Jean, le père de Lucas, est assis dans le salon. Il est calme, mais il sourit à Élise.",
     en:"Inside the house, the kitchen smells wonderful. Marie has prepared a big meal: chicken, vegetables, and a chocolate cake for dessert. Jean, Lucas's father, is sitting in the living room. He's quiet, but he smiles at Élise."},
    {t:'d', s:'Jean', fr:"Bonsoir, Élise. Bienvenue dans la famille.", en:"Good evening, Élise. Welcome to the family."},
    {t:'d', s:'Élise', fr:"Merci, Monsieur.", en:"Thank you, sir."},
    {t:'d', s:'Jean', fr:"Jean, s'il te plaît. Pas de « Monsieur » ici !", en:"Jean, please. No \"sir\" here!"},
    {t:'p', fr:"Emma, la petite sœur de Lucas, arrive en courant.", en:"Emma, Lucas's younger sister, comes running in."},
    {t:'d', s:'Emma', fr:"C'est toi, Élise ? Tu es plus jolie que sur les photos !", en:"Is that you, Élise? You're prettier than in the photos!"},
    {t:'d', s:'Élise (riant)', fr:"Merci, Emma !", en:"Thank you, Emma!"},
    {t:'d', s:'Emma', fr:"Tu parles bien français, pour une Américaine !", en:"You speak French well, for an American!"},
    {t:'d', s:'Lucas', fr:"Elle n'est pas américaine, Emma...", en:"She's not American, Emma..."},
    {t:'d', s:'Emma', fr:"Ah bon ? Alors tu viens d'où ?", en:"Oh really? So where are you from?"},
    {t:'d', s:'Élise', fr:"Je viens d'un autre pays, mais maintenant, j'habite ici, avec vous.", en:"I come from another country, but now, I live here, with you."},
    {t:'p', fr:"Tout le monde rit. Élise pense que sa nouvelle famille est vraiment sympa, même si elle a encore peur de faire des erreurs en français.",
     en:"Everyone laughs. Élise thinks her new family is really nice, even if she's still afraid of making mistakes in French."},
    {t:'d', s:'Thomas', fr:"Alors, Élise, tu sais faire la cuisine française ?", en:"So, Élise, do you know how to cook French food?"},
    {t:'d', s:'Élise', fr:"Pas encore ! Mais je veux apprendre.", en:"Not yet! But I want to learn."},
    {t:'d', s:'Thomas', fr:"Parfait ! Parce que Marie adore enseigner ses recettes.", en:"Perfect! Because Marie loves teaching her recipes."},
    {t:'d', s:'Marie', fr:"C'est vrai ! On peut cuisiner ensemble ce week-end, si tu veux.", en:"It's true! We can cook together this weekend, if you want."},
    {t:'d', s:'Élise', fr:"J'aimerais beaucoup, merci !", en:"I'd really like that, thank you!"},
    {t:'p', fr:"Après le dîner, tout le monde parle et rit autour de la table. Élise ne comprend pas chaque mot, mais elle comprend les sourires, et ça, c'est déjà beaucoup.",
     en:"After dinner, everyone talks and laughs around the table. Élise doesn't understand every word, but she understands the smiles, and that's already a lot."},
    {t:'p', fr:"Plus tard, dans la voiture, Lucas et Élise rentrent chez eux.", en:"Later, in the car, Lucas and Élise head home."},
    {t:'d', s:'Lucas', fr:"Alors, qu'est-ce que tu penses de ma famille ?", en:"So, what do you think of my family?"},
    {t:'d', s:'Élise', fr:"Je les trouve adorables. J'ai un peu de mal avec la langue, mais je suis très heureuse d'être ici.", en:"I find them lovely. I have a bit of trouble with the language, but I'm very happy to be here."},
    {t:'d', s:'Lucas', fr:"Tu vas apprendre vite, j'en suis sûr. Et je vais t'aider, chaque jour.", en:"You'll learn fast, I'm sure of it. And I'll help you, every day."},
    {t:'d', s:'Élise', fr:"Merci, Lucas. Je t'aime.", en:"Thank you, Lucas. I love you."},
    {t:'d', s:'Lucas', fr:"Moi aussi, je t'aime. Bienvenue chez toi.", en:"I love you too. Welcome home."},
    {t:'p', fr:"Le lendemain matin, Élise se réveille dans la maison de Lucas. Il fait déjà jour, et elle entend du bruit dans la cuisine.",
     en:"The next morning, Élise wakes up in Lucas's house. It's already light out, and she hears noise in the kitchen."},
    {t:'d', s:'Lucas', fr:"Bonjour ! Tu veux un café ?", en:"Good morning! Do you want a coffee?"},
    {t:'d', s:'Élise', fr:"Oui, merci. J'ai vraiment besoin d'un café ce matin !", en:"Yes, thanks. I really need a coffee this morning!"},
    {t:'p', fr:"Ils boivent leur café ensemble, assis dans la petite cuisine. Dehors, il fait beau, et le soleil brille déjà.",
     en:"They drink their coffee together, sitting in the small kitchen. Outside, the weather is nice, and the sun is already shining."},
    {t:'d', s:'Lucas', fr:"On a besoin de faire les courses aujourd'hui. Tu veux venir avec moi ?", en:"We need to go grocery shopping today. Do you want to come with me?"},
    {t:'d', s:'Élise', fr:"Oui, avec plaisir ! J'aime bien découvrir les magasins d'ici.", en:"Yes, gladly! I like discovering the shops around here."},
    {t:'p', fr:"Ils prennent la voiture et vont au marché. Élise trouve tout différent : les fruits, les légumes, même les odeurs. Mais elle trouve ça vraiment intéressant.",
     en:"They take the car and go to the market. Élise finds everything different: the fruits, the vegetables, even the smells. But she finds it really interesting."},
    {t:'d', s:'Lucas', fr:"Alors, qu'est-ce que tu penses du marché français ?", en:"So, what do you think of the French market?"},
    {t:'d', s:'Élise', fr:"J'adore ! C'est très différent des marchés chez moi, mais je trouve ça génial.", en:"I love it! It's very different from the markets back home, but I think it's great."},
    {t:'p', fr:"Après les courses, ils rentrent à la maison. Élise commence déjà à se sentir un peu plus chez elle. Elle pense : « Peut-être que soixante jours, ce n'est pas si long. »",
     en:"After the shopping, they head home. Élise already starts to feel a little more at home. She thinks: \"Maybe sixty days isn't so long after all.\""},
    {t:'p', fr:"C'est le premier jour d'une longue histoire — soixante jours pour apprendre à parler, à comprendre, et à aimer une nouvelle famille.",
     en:"It's the first day of a long story — sixty days to learn to speak, to understand, and to love a new family."}
  ];
});
</script>
</body>
</html>
